name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    # -----------------------------
    # Install dependencies (client)
    # -----------------------------
    - name: Install frontend dependencies
      run: npm install
      working-directory: ./client

    - name: Install Playwright at root
      run: npm install @playwright/test
      working-directory: ./


    # -----------------------------
    # Install dependencies (server)
    # -----------------------------
    - name: Install backend dependencies
      run: npm install
      working-directory: ./server

    # If you use bcryptjs instead of bcrypt, it will build instantly.
    # bcrypt may require build tools. bcryptjs avoids that.

    # -----------------------------
    # Install Playwright browsers
    # -----------------------------
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      working-directory: ./client  # or root, depending on where PW is

    # -----------------------------
    # Run Playwright tests
    # -----------------------------
    - name: Run Playwright tests
      run: npx playwright test
      working-directory: ./
